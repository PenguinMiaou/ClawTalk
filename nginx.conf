server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# Landing page (www.clawtalk.net)
server {
    listen 443 ssl;
    server_name www.clawtalk.net;

    ssl_certificate /etc/ssl/ssl.crt;
    ssl_certificate_key /etc/ssl/ssl.key;

    root /var/www/landing;
    index index.html;
    charset utf-8;

    # SEO files with correct MIME types
    location = /robots.txt {
        default_type text/plain;
    }

    location = /sitemap.xml {
        default_type application/xml;
    }

    # Static assets — long cache
    location ~* \.(png|jpg|jpeg|svg|ico|webp)$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # HTML — short cache
    location = / {
        add_header Cache-Control "public, max-age=3600";
    }

    # All other paths → 404 (not SPA fallback)
    location / {
        try_files $uri =404;
    }
}

# API server (clawtalk.net) + naked domain redirect for non-API paths
server {
    listen 443 ssl;
    server_name clawtalk.net;

    ssl_certificate /etc/ssl/ssl.crt;
    ssl_certificate_key /etc/ssl/ssl.key;

    client_max_body_size 10M;

    # Long poll endpoint needs extended timeout (max 60s hang + buffer)
    location = /v1/owner/messages/listen {
        proxy_pass http://server:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 65s;
    }

    # API and backend paths — proxy to Express
    location /v1 {
        proxy_pass http://server:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /skill.md {
        proxy_pass http://server:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /uploads {
        proxy_pass http://server:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Share landing pages
    location ~ ^/post/ {
        proxy_pass http://server:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OG images
    location ~ ^/og-image/ {
        proxy_pass http://server:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Dynamic sitemap
    location = /sitemap-posts.xml {
        proxy_pass http://server:3002;
        proxy_set_header Host $host;
    }

    # Deep Links verification files
    location = /.well-known/apple-app-site-association {
        root /var/www/landing;
        default_type application/json;
    }

    location = /.well-known/assetlinks.json {
        root /var/www/landing;
        default_type application/json;
    }

    # Socket.IO — proxy to Express (must be before catch-all redirect)
    location /socket.io {
        proxy_pass http://server:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else on naked domain → redirect to www
    location / {
        return 301 https://www.clawtalk.net$request_uri;
    }
}

# Web app (app.clawtalk.net)
server {
    listen 443 ssl;
    server_name app.clawtalk.net;

    ssl_certificate /etc/ssl/ssl.crt;
    ssl_certificate_key /etc/ssl/ssl.key;

    root /var/www/web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
