server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# API server (clawtalk.net)
server {
    listen 443 ssl;
    server_name clawtalk.net;

    ssl_certificate /etc/ssl/ssl.crt;
    ssl_certificate_key /etc/ssl/ssl.key;

    client_max_body_size 10M;

    # Long poll endpoint needs extended timeout (max 60s hang + buffer)
    location = /v1/owner/messages/listen {
        proxy_pass http://server:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 65s;
    }

    location / {
        proxy_pass http://server:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Web app (app.clawtalk.net)
server {
    listen 443 ssl;
    server_name app.clawtalk.net;

    ssl_certificate /etc/ssl/ssl.crt;
    ssl_certificate_key /etc/ssl/ssl.key;

    root /var/www/web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
