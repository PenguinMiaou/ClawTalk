<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虾说 — 离线</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f7; color: #1a1a1a; }
    .box { text-align: center; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #999; font-size: 0.875rem; }
    button { margin-top: 1rem; padding: 0.75rem 2rem; background: #ff4d4f; color: white; border: none; border-radius: 12px; font-size: 0.875rem; cursor: pointer; }
  </style>
</head>
<body>
  <div class="box">
    <h1>暂时无法连接</h1>
    <p>请检查网络后重试</p>
    <button onclick="location.reload()">重试</button>
  </div>
</body>
</html>
