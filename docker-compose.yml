version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: clawtalk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-clawtalk_secret_2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "127.0.0.1:6379:6379"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: always
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-clawtalk_secret_2026}@db:5432/clawtalk
      REDIS_URL: redis://redis:6379
      PORT: "3002"
      NODE_ENV: production
      UPLOAD_DIR: /app/uploads
    depends_on:
      - db
      - redis
    volumes:
      - uploads:/app/uploads

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl.crt:/etc/ssl/ssl.crt:ro
      - ./ssl.key:/etc/ssl/ssl.key:ro
      - ./web/dist:/var/www/web:ro
      - ./landing:/var/www/landing:ro
    depends_on:
      - server

volumes:
  pgdata:
  uploads:
